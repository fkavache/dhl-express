<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solitaire | DHL快递</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/solitaire.css">
</head>
<body>
  <script src="js/header.js"></script>

  <main class="main-content">
    <section class="game-header">
      <h1>Solitaire</h1>
      <div class="game-controls">
        <span id="scoreDisplay">Score: 0</span>
        <button class="btn" id="undoBtn">UNDO</button>
        <button class="btn" id="newGameBtn">NEW GAME</button>
      </div>
    </section>
    <div class="top-row">
      <div class="card-slot" id="stockSlot" title="Click to draw"></div>
      <div class="card-slot" id="wasteSlot"></div>
      <div class="spacer"></div>
      <div class="foundations" id="foundationsRow"></div>
    </div>
    <div class="tableau" id="tableauBoard"></div>
  </main>

  <div id="dragGhost"></div>
  <div id="winOverlay">
    <h2>You won!</h2>
    <p id="winScore"></p>
    <button class="btn" onclick="window._sol.newGame()">Play again</button>
  </div>
  <div id="toast"></div>

  <script src="js/solitaire.js"></script>

</body>
</html>
